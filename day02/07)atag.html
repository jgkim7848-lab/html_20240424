    <!-- 
    a tag 
    다른 페이지로 이동하는 태그
    쌍태그안에 글자를 클릭하면 이동하게 됨
    
    href=""
    이동할 url 값이 없으면 현재 페이지에서 새로고침
    속성값에 http:// url로 인식, 없으면 파일로 인식함. 내폴더 안에서 파일 검색
    tel 전화번호로 연결됨.
    mailto 이메일로 연결됨.


    target 속성
    _self _blank _parent _top 속성
    self  기본갑스 현재 화면에서 링크 새로 연결
    blank 새창에서 링크 연결
    parent 부모창에서 링크 연결
          결제창처럼 팝업창이 뜨고(자식창) 
         팝업에 대한 값을 반영하여 원래 ㅏㅇ(부모창)이 변경되는 경우에 사용함.
    top 최고조상에서 링크 연결
    다중파법이 뜰 경우 메인창으로 값을 연결할경우 사용
    부모X 조상X self와 동일함.
    
    
    download 속성
    파일 다운로드 할 경우 href 속성에 파일 경로가 있고 download 속성이 추가될 경우 해당 파일을 다운로드 할수있음.

    -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- img 태그
     input type image와 같은 기능을 하는 태그
     src 그림 경로
     alt 그림 없을ㄸ 나타나는 글자
     width 그림 가로길이
     height 그림 세로 길이
     pixel 이미지 사이즈  %로 표기 가능
     
     
     이미지 형식
     html에서 사용되는 이미지 포멧 중 jpg, png등이 대표적.
     jpg 손실 압축 포멧 - 사진
     이미지의 해상도가 손상되어도 용량을 많이 줄이는게 jpg
     png 무손실 압축
     이미지 해상도의 손실을 줄이고 투명 배경이 가능함.
     좋은 화질.


     이미지 파일들은 헤더 영역이라는게 있는데 image/jpg 내가 무슨 파일이다 하는 기호를 보유하고있다.

     -->




    <img src="../image/강아지.jpg" alt="강아지">
    <img src="../image/강아지.jpg" alt="강아지" width="300" height="300"><br>
    <!-- 나를 감싸고 있는 태그 (부모) 기준으로 % -->
    <img src="../image/강아지.jpg" alt="강아지" width="100%">




</body>
</html>

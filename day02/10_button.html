<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- button태그 input type button과 같은 기능.
     form 태그와 같이 사용.
     form태그 안에서 버튼 태그의 기본값이 submit -->
     <button>일반버튼</button>
<button type="submit">제출버튼? form태그가 없어서 무의미</button>
 
<form action="">
    <input type="text" name="id">
    <button>form태그 안의 버튼은 기본적으로 submit이 보장된다.</button>
</form>

  <!-- 
        button tag : input type="button"과 같은 기능
        button type="button" / submit / reset
        form 태그와 같이 사용
        form 태그안에서 버튼 태그의 기본값이 submit
        input 보다는 button 태그를 더 많이 사용
    -->
    <button>일반버튼</button>
    <button type="submit"> submit 버튼</button>
    <button type="reset">reset</button>

    <form action="">
        <input type="text" name="id">
        <!-- form 안의 버튼의 기본값은 submit -->
        <button>submit</button>
    </form>













</body>
</html>

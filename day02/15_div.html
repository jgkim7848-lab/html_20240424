<!-- 
태그 분류 방법
block  inline inlineblock

block
 - 혼자 한 라인을 차지
 - 가로 세로 크기 조절 가능
 - 여백 조절 가능
 - div h p form table
 
inline
 - 한 라인에서 계속 유지 되는 태그.
 - 컨텐츠 자체가 태그의 크기가 된다. = 가로세로 조절이 안됨. 늘리고싶으면 그만큼 채워야.
 - 여백을 줄수없다.
 - 폰트 크기 지정 가능
 - span b del ins i

inlineblock
 - 한 라인에서 계속 유지되는 태그
 - 가로세로 크기 조절 가능
 - 여백 지정 가능
 - input img

-->


<!-- 딱히 기능 없는 태그도 많다. 하지만 그냥 생긴 애들임. -->

<main></main>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /*style 태그 안의 주석은 이렇게 써야함.
<!-- -->로 주석을 작성하면 style 안에선 주석이 아니게 됨.*/

        img {
            width: 100px;
            height: 100px;
        }
    </style>

</head>

<body>
    <!-- 
    css 스타일을 꾸며주는 기능
    html 태그의 스타일을 꾸며주는 기능임.
    
    css 적용하는 방법
    1 style 태그를 사용해 직접 적용.
       head 태그 내부에 선언
    2 각 태그마다 직접 style 속성 적용
    3 css 파일을 만들어 link를 이용해 파일을 연결.
    3번을 많이 씀.
    하나의 파일로 여러 html에 동일하게 적용이 가능하다는 장점
    -->
    <img src="./doggy.jpg" alt="">
    <img src="./doggy2.jpg" alt="">

 같은 선택자는 같은 스타일을 적용받게된다.

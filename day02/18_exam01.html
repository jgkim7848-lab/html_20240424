<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.a{
    color: blue;
}

.b{
    color: red;
}

.c{
    color: rgb(239, 0, 219);
}

ol{

    font-size: 20px;


}

li:nth-child(2n){
    color: red;
}

li:nth-child(3n){
    color: green;
}

li:nth-child(1){
    font-weight: bold;
}

li:nth-child(10){
    font-weight: 700;
}

</style>





</head>
<body>
    <!-- 
    div3개를 만들어서
    하나는 네이버 하나는 구글 하나는 유튜브로 각각 연결되게 하고
    각자 글자색 다르게.
    -->
<div><a href="http://www.naver.com" target="_blank" class="a">naver</a></iframe></div>


<div><a href="http://www.google.com" target="_blank" class="b">google</a></div>

<div><a href="http://www.youtube.com" target="_blank" class="c">youtube</a></div>

<br>

<!--짝수 빨간색. 3 6 9 초록색.  1 10 굵게font weight bold/ 700
전체 글자 크기 font size 20px -->




<ol>

    <li>1</li>
    <li>2</li>
    <li>3</li>
    <li>4</li>
    <li>5</li>
    <li>6</li>
    <li>7</li>
    <li>8</li>
    <li>9</li>
    <li>10</li>


</ol>

</body>
</html>

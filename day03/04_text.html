<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    text 글자 상태
    text indent 들여쓰기 문장에서 첫문단의 첫줄만 들여쓰기
    text align 가로정렬 left right center justify
    text decoration 선긋기
     - none 없음
     - underline 밑줄
     - overline 윗줄
     - line through 가운데줄 (취소선)
     

    -->

    <!-- 
    css단위
    px pixel 단위
    % 퍼센트
    em 배수
    rem 배수
    cm / mm / in  
    pt 포인터
    pc 피카소
    deg 각도
    
    -->

<!-- 
    text-overflow  텍스트가 범위를 넘어가는 경우
    with-space 글자가 넘어가면 넘어간 글자를 어떻게 처리할것이닞
     - nowrap 한줄ㄹ ㅗ처리
     - wrap 줄바꿈
    overflow 요소가 넘어가면 어떻게 처리할지
     - hidden 숨김
     - scroll 스크롤바 생성
     - auto 스크롤바 자동생성
-->

<style>
p{
    text-indent: 15px;
    text-align: justify;
}
.line{
    width: 500px;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
}

</style>


</head>
<body>
    <a href="">a tag를 사용하면 자동으로 줄이 생깁니다.</a>

<p class="line">안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다안녕하세요 홍길동입니다</p>


</body>
</html>

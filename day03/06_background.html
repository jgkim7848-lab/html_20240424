<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 
background 배경
background-color 배경색
background image 배경 ㅁ이미지
둘다 존재하면 이미지가 우선 출력됨.
이미지가 화변보다 작을경우 남는 부분에 배경색이 출력됨.
-size 배경 이미지의 크기 가로 세로 얼마나 줄지
-repeat 배경 이미지 반복
 no-repeat 반복 없음
 repeat-x / y  x축 혹은 y축 반복
 round 양쪽 반복
-position 배경 이미지 위치
 -center 가운데
 -x y 축이동

-->
    <style>
        .box {
            width: 300px;
            background-color: antiquewhite;
            background-image: url(../image/doggy2.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

        }
        .box2{
            width: 100%;
            height: 600px;
            background-color: aqua;
            background-image: url(../image/bground.jpg);
            background-size: cover;
            background-position: center;
        }
    </style>



</head>

<body>
    <div class="box"></div>
    <!-- .box하고 엔터인가 하니까 div 만들어지네 단축키  -->
    <div class="box2"></div>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
100px를 놔도 이게 나중에 보더라인이 커지면 100px를 넘어가게 되므로
그걸 케어하는게 box    
-->
<!-- 딱 선까지만 최종적인 사이즈로 하고싶을때 box-sizing을 쓴다??? -->
<!-- box sizing에 따라서 width 크기가 
 컨텐츠의 가로길이가 될수도있고 박스 전체의 가로길이가 될수도있다
 border box    width 컨텐츠의 가로 + 패딩왼오  + 테두리 왼오
 content box   width   컨텐츠의 가로 )기본)

width 100px   padding5px  border1px
하면 border box 길이는 가로88+ 5+ 5 + 1 +1 = 100px
content box는?   가로100 + 5 + 5 + 1 + 1 = 112가 됨.


 
 -->
<style>
            @font-face {
            font-family: gothic;
            src: url(../font/nanumgothic/NanumGothic-Bold.ttf);
        }
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            padding: 5px;
            box-sizing: border-box;
            background-color: pint;
        }

.box1{
    background-color: pink;
    box-sizing: border-box;
}

.box2{
    background-color: green;
    box-sizing: content-box;
}


.naver{
    width: 380px;
    height: 56px;
    background-color: green;
    box-shadow: none;
    border-radius: 10px;
    border-bottom: none;
}

div>a>button{
    width: 380px;
    height: 56px;
    border-radius: 10px;
    background-color: green;
    border-collapse: collapse;
    border-color: green;
    box-shadow: none;
    border-bottom: none;

    font-family: gothic;
    font-size: large;
    font-weight: 900;
    color: white;
    border-collapse: collapse;
    box-shadow: none;

}

a{
    font-family: gothic;
    font-size: large;
    font-weight: 900;
    color: white;
    border-collapse: collapse;
    box-shadow: none;
}

    </style>

</head>

<body>

    <div class="box box1"></div> 
    
    <br>


    <div class="box box2"></div>


    <br>


    <div class="naver"><a href="http://naver.com"><button>NAVER</button></a></div>
<!-- 380 * 56 -->
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: brown;
            float: left;
            margin: 10px;
            color: white;
            text-align: center;
        }

        .box:hover {
            background-color: green;
            transform: translate(20%);
            transform: translateY(20%);
        }
    </style>





</head>

<body>
    <div class="p-box">
        <div class="box">T</div>
        <div class="box">H</div>
        <div class="box">A</div>
        <div class="box">N</div>
        <div class="box">K</div>
        <div class="box">S</div>


    </div>




</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
            width: calc(100% / 4); /*무조건 부모의 100% 없으면 body의 %*/
            height: 50px;
            border: 1px solid black;
            background-color: white;
            text-align: center;
            float: left;
            box-sizing: border-box;
/*박스 사이징이랑 width에서 calc(100% / 4)말고 다른 방법으로 했었음 아*/
        }

        .box1 {
            border-right: none;
        }

        .box2 {
            border-right: none;
        }

        .box3 {
            border-right: none;
        }



        .box:hover {
            background-color: yellow;
        }

.box {
    position: relative;
}

.box span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}




    </style>



</head>

<body>
    <div class="p-box">
        <div class="box box1"><span>menu1</span></div>
        <div class="box box2"><span>menu2</span></div>
        <div class="box box3"><span>menu3</span></div>
        <div class="box box4"><span>menu4</span></div>
    </div>

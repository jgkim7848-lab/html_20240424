<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
aniamtion
규칙적인 움직임을 줄때 사용함.
1애니메이션 등록.  @keyframes
시간배울0 에서 100퍼센트   
@keyframes 애니메이션 이름{
시간배율{
스타일};
시간배율{
스타일};
시간배율{
스타일};
시간배율{
스타일};
.....


}

2 애니메이션 적용
적용하려는 대상에게 애니메이션 등록
animation-name 동작할 애니메이션 이름
animation-duration 동작 시간
animation-iteration-count 동작 횟수


-->

<style>
@keyframes scaleFont{
    0%{
        font-size: 20px;
    }
        50%{
        font-size: 20px;
    }
        100%{
        font-size: 20px;
    }


}

.ani{
    font-size: 20px;
    animation-name: scaleFont;
    animation-duration: 5s;
    animation-iteration-count: 2;

}

</style>


</head>

<body>
<span class="ani">animation</span>

</body>

</html>

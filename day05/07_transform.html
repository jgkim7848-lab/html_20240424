<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
transform
회전 이동 확대 기울림 자신을 움직이는 속성
translate(x,y) x축y축 방향으로 값만큼 이동
translateX  translateY
scale(w,h) 가로로 w배 세로로h배
  - 값을 0으로 주면 사라짐
이 scale 도 scaleX scaleY 별도로 줄수있음.

rotate(a)  a각도만큼 시계방향 회전, 단위는 deg
skew(xa,ya) x 축으로xa만큼 y축으로 ya만큼 기울림
skewX  skewY



transition효과
다른 속성값이 변화할때 서서히 변화하도록 하는 효과
애니메이션 효과가 발생한것처럼 보이게함.
transition 속성명 전환시간;
해당 속성이 전환시간동안 서서히 변환하게.


-->

    <style>
        @keyframes translate {/*단순한 직선이동*/
            0% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(50px, 50px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        @keyframes scale {/*x y만큼 늘리기*/
            0% {
                transform: scale(1, 1);
            }

            50% {
                transform: scale(2, 2);
            }

            100% {
                transform: scale(1, 1);
            }
        }

        @keyframes rotate {/*회전*/
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(90deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes skew {/*비틀기*/
            0% {transform: skew(0deg,0deg);}

            50% {transform: skew(10deg,10deg);}

            100% {transform: skew(0deg,0deg);}
        }

        .box {
            width: 200px;
            height: 50px;
            background-color: rebeccapurple;
            animation: skew 2s 4;
        }
        .font{
            font-size: 20px;
            transition: 2s;
        }
        .font:hover{
            font-size: 50px;
        }
    </style>


</head>

<body>
    <div class="box"></div>
    <div class="font">transition</div>

</body>

</html>

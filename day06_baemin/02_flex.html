<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        flex - display 속성중 하나임.
        사용자 편리성을 위해 만들어진것들
        table flex grid

        flex
        flex 속성은 부모 높이를 인지 못하는 번거로움을 줄이기 위해
             만들어짐.
            레이아웃 배치 전용 기능으로 고안됨.
            float inline 등의 기존 방식에 비해 훨신 강력한 요소와 편리한 기능이 존재함.
            부모요소 - flex container
            자식요소 - flex item
        flex container - flex 기능에 영향을 받는 공간임.
                        이걸 벗어나면 영향을 안받음
                        설정된 속성에 따라 각각의 item들이 어떤 형태로 배치되는가가 결정된다.

            
        container 설정
        display- flex
        flex-direction  item들을 배치할 방향
        row column   기본적으론 한줄, 세로 배치가 기본으로 되있긴함.
        너비안에 다 안되면?
         - flex-wrap  줄넘김 방식, nowrap - 줄바꿈 없음. wrap 줄바꿈있음.
        justify-content 가로정렬방식
        flext-start/end
        center
        space-between  균등분배
        
    -->
</head>
<body>

    <div class="container">
<div class="item"> </div>
<div class="item"></div>
<div class="item"></div>


    </div>
    
</body>
</html>

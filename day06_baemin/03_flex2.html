## ✔️ 지금 상황 구조

너 코드 보면:

```css id="bug01"
ul > .right {
    float: right;

👉 float 쓰면:

* li들이 **문서 흐름에서 빠짐**
* 부모(`ul`, `nav`)가 **높이를 제대로 못 가짐**

## ✔️ 그래서 무슨 일이 생기냐

```html id="bug02"

👉 nav가 “비어있는 공간처럼” 취급됨

---

## ✔️ 해결 방법 2개 (중요)

---

# 🔥 방법 1 (추천) — clearfix 넣기

```css id="fix01"
ul::after {
    content: "";
    display: block;
    clear: both;
}
```

👉 float 때문에 깨진 부모 높이 복구

---

# 🔥 방법 2 — nav에 높이 강제

```css id="fix02"
nav {
    overflow: hidden;
}
```

👉 이것도 float 문제 해결됨

---

## ✔️ 추가로 더 좋은 구조 (추천)

지금 float 방식은 옛날 방식이라서

👉 요즘은 이렇게 씀:

```css id="fix03"
li {
    display: inline-block;
}
```

👉 float 안 쓰고 메뉴 만들기

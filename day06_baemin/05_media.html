<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 
media-qeury 반응형 화면을 만들기위한 속성    
-->
    <style>
        .mw {
            border: 1px solid black;
            max-width: 600px;



        }

        .nw {
            border: 1px solid black;
            min-width: 600px;




        }


        .title {
            font-size: 40px;

        }

        @media screen and (max-width : 600px) {
            .title {
                font-size: 20px;
            }
        }
    </style>


</head>

<body>
    <div class="title">
        <h1>hello world</h1>
        <h3>font size 변경</h3>


    </div>




    <div class="mw"> 브라우저의 사이즈 : 모니터, TV, 탭북, 핸드폰
        브라우저의 가로 사이즈에 따라 화면의 정보를 정확히 송출하기 위해
        width에 따른 레이아웃 변경 => 반응형 웹</div>
    <div class="nw"> width : 100% (부모의 기준) 부모가 없다면 화면 전체의 가로
        height : 100% (부모기준)
        vh / vw : 모니터(브라우저) 기준 높이 / 너비</div>
</body>

</html>

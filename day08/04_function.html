<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>
        function함수 특정 기능 수행을 위해 작성된 코드
        java 에서의 method와 동일한 의미를 가짐.


    </h1>
    <!-- 
함수는 호출되야 실행됨
자바의 메서드 처럼 호출해서 실행함.
자바에서는 클래스   메서드 생성    객체 생성     호출
자바 스크립트는 어디서든 function 생성 가능    호출

function 함수명(파라미터){
    로직 작성;
    리턴 값;
}

함수명 - 기능을 함축적으로 작성
파라미터(매개변수)    없어도 ()는 있어야
자바 스크립트는 파라미터의 자유도가 높아서 다양한 형태로 사용 가능함.
return  함수 종료의 역할과 동시에 특정 결과값을 호출한 위치로 반환함.
-->
    <script src="01_script.js"></script>
    <script>
        function myfirstfunc() {
            console.log("첫번째 함수");
        }

        myfirstfunc(); //함수 호출.


        function call(name) {
            console.log(`내 이름은 ${name}입니다.`);

        }

        call(`홍길동`);
        let name = '김영이';
        call(name);



        //num1 num2를 파라미터로 받아 두 수의 합을 콘솔에 출력하는 함수 생성ㅇ
        let num1 = 2;
        let num2 = 4;
        //'' 찍고 써서 문자로 받아들여가지고 + 써도 그냥 이어붙이기 하더라

        function hap(num1, num2) {
            let sum = num1 + num2;
            console.log(`num1 과 num2의 합은 ${sum} 이다`);

        }
        hap(num1, num2);



    </script>

 
</body>

</html>

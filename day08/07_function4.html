<!DOCTYPE html>
<html lang="en">

<body>
    <h1>화살표 함수</h1>
    <!-- 
    가독성은 떨어지는데 코드량을 많이 줄일수있어서 애용
    표현식 함수처럼 변수화 가능.
    -->

<script>
const arrowfunc = (p1, p2)=>{
    let result = p1 + p2;
    return result;
}
const arrowfunc2 = (p1, p2) => {return p1+p2};
const arrowfunc3 = (p1, p2) => p1+p2;
//return이 없으면 {}도 없다??

const arrowfunc4 = (p1, p2)=>{
    console.log(p1 + p2);
}


console.log(arrowfunc(1,2));

console.log(arrowfunc2(1,2));

console.log(arrowfunc3(1,2));

arrowfunc4(1,2);











</script>




</body>
</html>

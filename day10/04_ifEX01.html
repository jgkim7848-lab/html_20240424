<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>오늘은??</h1>
    <button id="btn">today</button>
    <!-- 버튼 누르면 오늘 날짜와 요일 출력 -->
    <h1 id="result"></h1>


    <script>
        //미리 정의되어있는 함수를 호출시 함수에 ()를 쓰지말것
        let btn = document.getElementById('btn');
        btn.addEventListener('click', function () {
            let today = new Date();
            let day;

            switch (today.getDay()) {

                case 0:
                    day = '일요일';
                    break;

                case 1:
                    day = '월요일';
                    break;

                case 2:
                    day = '화요일';
                    break;

                case 3:
                    day = '수요일';
                    break;

                case 4:
                    day = '목요일';
                    break;

                case 5:
                    day = '금요일';
                    break;

                case 6:
                    day = '토요일';
                    break;
            }
            result.innerText = `${today.getFullYear()}. ${today.getMonth() + 1}. ${today.getDate()}. ${day}`;
        })

    </script>






</body>

</html>

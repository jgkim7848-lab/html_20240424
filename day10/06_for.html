    <h1>반복문: for while do while</h1>
    <!-- 
    반복문의 문법은 java의 문법과 동일
    for 반복 횟수가 명확할때 사용
    while, do while 반복 횟수가 명확하지않을때 사용함

    모든 조건은 true일때 반복됨.
    조건식이 계속 true면 무한루프에 빠질수있음.
    코드안에 조건식의 값이 false로 바뀔수 있는 구문이 반드시 있어야함.

    break를 통해 조건식을 동반하여 빠져나갈수있음.
    -->

<script>
    for(let i = 0; i <=10; i++){
        console.log(i);

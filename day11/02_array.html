<!-- 자바스크립트에서의 배열은 java에서의 list, array의 혼합 형태를 가진다.

1 list처럼 크기가 유동적이다.
2 표현은 배열처럼 arr[0]

const arr = new Array(1,2,3) 가능은 한데 잘 안씀.

-->

<script>
//호이스팅 써볼 예정??

//자바스크립트에서의 배열은 타입 혼용이 가능함.
const myArray = [1,2,3,'a', 'b', [1,2,3], {key:'value'}];
//이렇게 하는게 가능은 한데 보통은 용도를 맞춰서 배열을 만들기때문에
//하나의 타입만 들어가는게 주로 됡임
console.log(myArray);
console.log(myArray.length);
console.log(myArray[5]);
console.log(myArray[myArray.length-1]);


//배열의 마지막 요소에 값을 추가
myArray[myArray.length] = 10;
console.log(myArray)
myArray[1] = 20;
console.log(myArray);
//번지 계산을 개떡같이 한다면??
console.log("=========================");

myArray[10] = 100;
console.log(myArray);
console.log("=========================");

for(let i = 0; i < myArray.length; i++){
    console.log(myArray[i] ?? '빈값');
}
console.log("for of문 ===========");


for(let a of myArray){
    console.log(a);

}
console.log("=========================");
//const 란 구조를 유지하는거다. 
//즉 배열을 선언하면 배열로 선언한게 다른걸로 바뀔수없다는거지 
//배열 자체는 유지됨 값은 얼마든지 바꿔도 ok.
//주소와 구조가 불변일뿐 내용물은 바껴도 됨.



</script>

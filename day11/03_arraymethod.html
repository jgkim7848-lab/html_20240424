    <h1>배열관련 메서드</h1>
    
<!-- 
유사 배열 htmlcommlection / nodelist
혼합배열
경우에 따라선 사용 제한 메서드도 존재는 함.    
-->

<!-- 
array.push(value)를 하면 배열 마지막 위치에 value를 추가한다.
array.pop   배열의 마지막 요소를 제거.   제거한 요소 리턴함.
array.shift()  배열의 첫번재 요소를 제거함.
array.unshift(value) 배열의 첫 요소를 추가.   원래 있던건 1개씩 뒤로 밀림
    => 배열의 길이 리턴함.
array.join(value) 배열의 값에 특별한 value를 추가함.
    => 하나의 문자열로 리턴받음  배열 1 2 3에 array.join(",") 하면 1,2,3으로 리턴해준다??
    =>보통 구분자읠 가능성이 높은 
    ->string method에서의 split과 반대되는 개념임,                                                                                                                                                                                                                                                                                                      
-->

<!-- 
        - array.push(value) : 배열의 마지막 위치에 value 추가
            => 배열 길이를 리턴
        - array.pop() : 배열의 마지막 요소를 제거
            => 제거한 요소를 리턴
        - array.shift() : 배열의 첫 요소를 제거
            => 제거한 요소를 리턴
        - array.unshift(value) : 배열의 첫 요소에 value를 추가
            => 배열 길이를 리턴
        - array.join(value) : 배열의 값에 특별한 value를 추가하여 하나의 문자열로 리턴
            => 1 2 3  array.join(",") => 1,2,3
            => split(String 메서드  구분자를 기준으로 잘라서 배열로 리턴)

    -->
    <script>
        const h1 = document.getElementsByTagName('h1');
        console.log(h1); 

        const h = document.querySelectorAll('h1');
        console.log(h);

        let str = 'apple,banana,kiwi';
        let array = str.split(",");
        console.log(array);
        console.log(array.join("/")); // apple/banana/kiwi

        console.log("--------");
        array.push("orange");
        console.log(array);
        console.log(array.push("orange")); // length 리턴
        // 배열은 중복 가능 => index로 구분이 가능하기 때문에
        console.log(array);
        console.log(array.pop());
        console.log(array);
        
        // shift 배열의 첫요소 제거
        console.log(array.shift());
        console.log(array);

        // unshift(value) : 배열의 첫요소 추가
        console.log(array.unshift('aaa'));
        console.log(array);

        // 일반적으로 빈배열을 만들어두고, 하나씩 추가하여 사용
        const array1 = [];

    </script>

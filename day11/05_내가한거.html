    <h1>배열의 정렬</h1>
    <!-- 
배열의 정렬 sort는 문자 기반이다.
array.sort()   문자기반 오름차순 정렬 ascending
array.reverse()  문자기반 역정렬 descending
정렬할 배열의 원소가 숫자일 경우 콜백 함수를 통해 내부 연산 기법을 이용함.

내부 연산을 한다? - array.sort(function(a,b){return a - b})오름차순
                                                b - a하면 내림차순
ㅇ

-->

    <script>

        const numArray = [1, 2, 3, 4, 5, 8, 7, 6, 5];
        const strArray = ['a', 'd', 'r', 't', 'e', 'b', 'o', 'c'];

        console.log(numArray.sort());

        console.log(strArray.sort())














        const cars = [

            { type: 'Volvo', year: 2025 },

            { type: 'BMW', year: 2023 },
            { type: 'Benz', year: 2026 }
        ];

        const result = cars.sort((a, b) => {
            return b.year - a.year;
        })
        console.log(result)


        const result2 = cars.sort((a, b) => {
            return a.type.localeCompare(b.type);
        })
        console.log(result2)


        console.log("0--------------------------0")

            { name: '짱구', age: 20 }
